<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin:0; background:#fff; color:#111827 }
      .bar { height:4px; background:#e53935 }
      .wrap { max-width: 960px; margin: 40px auto; padding: 0 16px }
      .card { border:1px solid #e5e7eb; border-radius: 16px; padding: 24px }
      .title { font-size: 24px; font-weight:700; color:#e53935; margin:0 0 6px }
      .sub { font-size: 14px; color:#6b7280; margin:0 0 16px }
      .btn { display:inline-block; padding:10px 14px; border-radius:10px; border:1px solid #e5e7eb; background:#f9fafb; color:#374151; font-weight:600; text-decoration:none }
      .btn:hover { background:#f3f4f6 }
    </style>
  </head>
  <body>
    <div class="bar"></div>
    <div class="wrap">
      <div class="card">
        <h1 class="title">Acceso validado</h1>
        <p class="sub">Bienvenido al dashboard corporativo.</p>
        <a class="btn" href="/">Volver al inicio</a>
      </div>
    </div>
  </body>
</html>
